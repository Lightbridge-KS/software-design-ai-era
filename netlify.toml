[build]
command = "pnpm build"
publish = "dist"

[build.environment]
# Astro 6.4 requires Node >=22.12.0. Pin to avoid drift on Netlify.
NODE_VERSION = "22"
# pnpm is detected from pnpm-lock.yaml; the examples/ subproject (its own
# package.json/lockfile, no workspace) is not installed or built here.
