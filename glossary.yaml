# ============================================================================
# The Design Glossary-Phrasebook — single source of truth for Appendix A
# ============================================================================
# Every chapter adds its vocabulary here in the same change set that adds the
# chapter prose. Appendix A renders from this file; never edit Appendix A's
# term list by hand.
#
# Schema per entry (the 4 phrasebook fields + metadata):
#
#   - term: Strategy pattern                  # canonical name, as an agent knows it
#     chapter: 10                             # chapter that introduces it
#     definition: >                           # 1. what the term means
#       Encapsulate a family of interchangeable algorithms behind a common
#       interface, and inject the chosen one.
#     why_it_matters: >                       # 2. the design force it addresses
#       Isolates the part that varies, so adding a variant never risks the
#       existing ones (Open-Closed Principle).
#     prompt_phrasing: >                      # 3. exact words that invoke it
#       "Refactor this if/elif chain to the Strategy pattern using functions
#       as strategies and a registry dict. Keep the public signature unchanged."
#     anti_phrase: >                          # 4. counter-instruction against
#       "Use plain functions in a dict —     #    over-application
#       no abstract base class unless strategies carry state. If there are
#       only two stable branches, keep the if."
#
# Keep entries in chapter order. `term` must be unique.
# ============================================================================

terms:
  - term: design vocabulary
    chapter: 1
    definition: >
      The shared names for structures — patterns, principles, smells — that
      compress an entire design intent into a phrase both humans and agents
      can act on.
    why_it_matters: >
      It is a protocol: one precise phrase fixes the contract of a change,
      turning review from discovery into verification. It works because
      agents trained on the same decades of literature share the codebook.
    prompt_phrasing: >
      "Refactor to [pattern], using [the form you want]. Keep the public
      signature unchanged. Do not introduce [the failure mode you fear]."
    anti_phrase: >
      "A pattern name is a hypothesis, not a command — pair every term with
      its right-sizing constraint, and review for fit."

  - term: essential vs. accidental complexity
    chapter: 2
    definition: >
      Essential complexity is inherent in the problem (tax law genuinely
      varies by country); accidental complexity is contributed by our
      solution's structure and can be designed away.
    why_it_matters: >
      Separates the difficulty you must accept from the difficulty you
      created — only the second is yours to win back.
    prompt_phrasing: >
      "Which of this complexity is essential to the problem, and which did
      our structure add?"
    anti_phrase: >
      "Don't 'simplify' away essential complexity — a missing tax rule is a
      bug, not elegance."

  - term: change amplification
    chapter: 2
    definition: >
      A symptom of complexity: one logical decision forces edits in many
      scattered places.
    why_it_matters: >
      Scattered edits are slow, error-prone, and a near-certain sign of a
      missing abstraction or boundary.
    prompt_phrasing: >
      "Does this change amplify — how many places must I edit for one
      decision?"
    anti_phrase: >
      "Not every multi-file change is amplification; a genuinely
      cross-cutting feature legitimately touches several places once."

  - term: cognitive load
    chapter: 2
    definition: >
      A symptom of complexity: how much a developer must hold in mind to
      change a piece of code safely.
    why_it_matters: >
      Understanding, not typing, is the scarce resource; high load is where
      mistakes and fear come from.
    prompt_phrasing: >
      "What must I understand to change this safely? List the hidden
      dependencies."
    anti_phrase: >
      "Fewer lines is not always lower load — a dense one-liner can cost
      more to understand than five plain ones."

  - term: unknown unknowns
    chapter: 2
    definition: >
      The worst symptom of complexity: behavior the structure decides
      silently, so you don't even know there is something you must change.
    why_it_matters: >
      You cannot grep for what you don't know exists; this is what makes a
      codebase frightening to touch.
    prompt_phrasing: >
      "What does this code decide silently — defaults, fall-through
      branches, implicit behavior?"
    anti_phrase: >
      "Surfacing an unknown unknown means naming the decision, not adding a
      guard for every imaginable case."

  - term: tactical vs. strategic programming
    chapter: 2
    definition: >
      Tactical programming optimizes for getting this feature working now;
      strategic programming treats a clean design as part of the
      deliverable, accepting a small constant cost to keep change cheap.
    why_it_matters: >
      An unconstrained agent is the ultimate tactical programmer — fast and
      locally correct; strategic restraint is the move only you can call.
    prompt_phrasing: >
      "Before making it work in the easiest spot, propose where this should
      live to keep the design clean."
    anti_phrase: >
      "Strategic isn't gold-plating — invest in the design the change needs,
      not the architecture you imagine wanting."

  - term: the design loop
    chapter: 3
    definition: >
      The iterative rhythm of working with an agent: intend → express →
      generate → review → refine, closing back on itself until accepted.
    why_it_matters: >
      A first result is a draft, not an answer; good design comes from the
      loop, not from a perfect opening prompt. Two phases are the human's —
      express (highest leverage) and review (where judgment lives).
    prompt_phrasing: >
      "Let's iterate: propose a design, I'll review, then we refine."
    anti_phrase: >
      "Don't ride momentum — a green checkmark is not the accept signal; an
      unreviewed draft is still a draft."

  - term: propose before coding
    chapter: 3
    definition: >
      A prompt move that asks the agent to design — signatures, return
      shape, relationship to existing code — before writing any
      implementation.
    why_it_matters: >
      Surfaces structure while it is still cheap to change, and pre-empts
      whole classes of error (duplication, wrong return type) before they
      reach code. The cheapest bug to fix is the one a constraint prevents.
    prompt_phrasing: >
      "Before writing any implementation, propose a design and one
      alternative with the trade-off. Don't write code yet."
    anti_phrase: >
      "Skip it for genuinely trivial edits — a one-line change doesn't need
      a design proposal."

  - term: guide and sensor (feedforward / feedback)
    chapter: 3
    definition: >
      Borrowed from harness engineering (martinfowler.com). A guide steers
      the agent before it acts (feedforward: conventions, types, design
      vocabulary); a sensor checks after it acts (feedback: review, tests,
      CI).
    why_it_matters: >
      Both are needed: guides without sensors never learn they failed;
      sensors without guides repeat the same mistakes.
    prompt_phrasing: >
      "Add a guide so this can't happen again" / "Add a sensor that catches
      this in CI."
    anti_phrase: >
      "Don't reach for a heavyweight sensor when a one-line guide (a type, a
      convention) would prevent the problem outright."

  - term: steering loop
    chapter: 3
    definition: >
      Borrowed from harness engineering (martinfowler.com). Promoting a
      recurring correction from a one-off fix into a persistent guide or
      sensor, so the system enforces it automatically thereafter.
    why_it_matters: >
      It is how a codebase gets softer over time instead of harder — each
      lesson learned once is encoded so it need never be relearned.
    prompt_phrasing: >
      "This keeps recurring — lock it with a test (sensor) or a rule in the
      conventions file (guide)."
    anti_phrase: >
      "Promote a correction only once it recurs or carries real risk — not
      every one-off needs to become a permanent rule."

  - term: cohesion
    chapter: 4
    definition: >
      How strongly the elements inside a unit (function, class, module)
      belong together. High cohesion: everything serves one purpose. Low
      cohesion: unrelated things share a body because the drawer was open.
    why_it_matters: >
      Low cohesion makes a small change frightening — you must reason about
      unrelated code that shares the same unit. It is one of Chapter 2's two
      master metrics.
    prompt_phrasing: >
      "Make this module cohesive — one purpose per unit." / "These things
      don't belong together; separate them."
    anti_phrase: >
      "Cohesion is symmetric: don't split parts that change together. Group
      by responsibility, not by line count."

  - term: single responsibility principle (SRP)
    chapter: 4
    definition: >
      A unit should have one reason to change. The sharpest way to count
      reasons is to count actors — the roles who could request a change.
    why_it_matters: >
      Multiple actors sharing one unit means any of them can break the
      others by accident; SRP gives each a separate place to stand.
    prompt_phrasing: >
      "This does too much — split by responsibility, one reason to change
      per unit. Group by actor."
    anti_phrase: >
      "Don't fragment into single-method classes; split only where parts
      change for genuinely different reasons."

  - term: one reason to change
    chapter: 4
    definition: >
      The operational test for SRP: if you can name two distinct
      circumstances (or actors) that would force a unit to change, it holds
      more than one responsibility.
    why_it_matters: >
      Turns the fuzzy "does too much" into a countable check you (or your
      agent) can apply to any function, class, or module.
    prompt_phrasing: >
      "How many reasons does this have to change? List the actors behind
      each."
    anti_phrase: >
      "One reason, not zero-tolerance: a few closely-related changes from
      the same actor are still one responsibility."

  - term: god object
    chapter: 4
    definition: >
      A class, module, or function that has accreted many unrelated
      responsibilities and touches most of the system — the extreme of low
      cohesion. Also: god function, god module.
    why_it_matters: >
      It is the single hardest kind of code to change safely, because every
      concern is entangled with every other and tests must drag all of it in.
    prompt_phrasing: >
      "This is a god function — break it apart by responsibility."
    anti_phrase: >
      "The fix is cohesive modules, not a swarm of tiny classes that
      recreate the tangle across ten files."

  - term: coupling
    chapter: 5
    definition: >
      How much one unit must know about another to do its job. A ladder from
      data coupling (pass the value) to stamp coupling (pass the object) to
      content coupling (reach into internals — the train wreck).
    why_it_matters: >
      Knowledge is coupling: code that knows another unit's shape breaks when
      that shape changes. It is Chapter 2's second master metric, and the
      price of Chapter 4's cohesion.
    prompt_phrasing: >
      "Reduce the coupling here." / "Pass the value, not the whole object."
    anti_phrase: >
      "Coupling is never zero — collaborators must share something; aim for
      the loosest rung that still works, not an interface for everything."

  - term: Law of Demeter (Principle of Least Knowledge)
    chapter: 5
    definition: >
      Talk only to your immediate friends, not to friends-of-friends. A
      chain of dots through distinct owners (a.b().c().d()) — a "train
      wreck" — is the tell-tale violation.
    why_it_matters: >
      A unit that reaches through an object graph is coupled to the shape of
      every object on the path; one distant change breaks it (and its copies).
    prompt_phrasing: >
      "This is a train wreck — fix the Law of Demeter violation by adding a
      method on the object that owns the data."
    anti_phrase: >
      "Not every dot is a violation; count owners, not dots. Don't grow
      pass-through wrappers at every level — a deep chain may mean the graph
      should be flattened."

  - term: tell, don't ask
    chapter: 5
    definition: >
      Don't pull an object's data out to make a decision about that object;
      tell the object and let it decide. Asking couples you to the data;
      telling couples you to a question.
    why_it_matters: >
      Keeps the decision with the data it concerns, so the knowledge of how
      that data is shaped stays in one place.
    prompt_phrasing: >
      "Refactor this ask-then-decide block to tell-don't-ask: put the
      decision on the object as a method or property."
    anti_phrase: >
      "Only when the decision is about that object's own state — don't pile
      another actor's behavior onto a data class and recreate a god object."

  - term: dependency direction
    chapter: 5
    definition: >
      The way a dependency arrow points: when A imports B, B can break A but
      not the reverse. The rule is to depend toward stability — stable cores
      should not depend on volatile details — and never form a cycle.
    why_it_matters: >
      Wrong-way arrows let volatile code (I/O, formats, frameworks) break the
      stable core; right-way arrows keep the core testable and durable.
    prompt_phrasing: >
      "Which way should this dependency point? The core shouldn't depend on
      I/O."
    anti_phrase: >
      "Fixing direction isn't the same as inverting it — don't add an
      abstraction to invert a dependency that has no reason to be inverted
      (that's Chapter 8, and only when earned)."

  - term: encapsulation
    chapter: 6
    definition: >
      Bundling state together with the behavior that guards it, exposing a
      deliberate public surface over a hidden implementation.
    why_it_matters: >
      An object that guards its own invariants cannot be put into an illegal
      state from outside; what is hidden cannot be coupled to or corrupted.
    prompt_phrasing: >
      "Hide the implementation; expose only what callers need." / "Make
      illegal states unrepresentable."
    anti_phrase: >
      "Encapsulation pays only when there's an invariant to guard — don't
      wrap plain data in ceremony that hides nothing."

  - term: information hiding
    chapter: 6
    definition: >
      Parnas's principle: hide the design decisions most likely to change
      (or most able to do harm) behind an interface, so callers cannot
      depend on them.
    why_it_matters: >
      Decisions you hide are free to change without breaking callers; it is
      the mechanism that produces loose coupling.
    prompt_phrasing: >
      "What's likely to change here? Hide it behind the interface."
    anti_phrase: >
      "Hide what changes or harms — not honest, stable data that callers
      legitimately need to read."

  - term: public API (public surface)
    chapter: 6
    definition: >
      The set of names a unit deliberately exposes to its callers — the
      methods, properties, and attributes that are not implementation
      detail. In Python, marked by the absence of a leading underscore and
      by __all__ at module level.
    why_it_matters: >
      The public surface is the contract; everything behind it is free to
      change. A narrow surface means fewer ways to be misused and less for
      any reader (or agent) to learn.
    prompt_phrasing: >
      "Narrow the public API — expose only what callers need; mark the rest
      private."
    anti_phrase: >
      "Narrow, not starved: don't hide things callers legitimately need and
      force them to reach around the wall."

  - term: immutability
    chapter: 6
    definition: >
      Making an object unchangeable after construction (e.g. a frozen
      dataclass), so there is no mutation to guard against.
    why_it_matters: >
      The strongest form of encapsulation for value objects: no setters, no
      stale state, safe to share freely.
    prompt_phrasing: >
      "Make this immutable — a frozen dataclass / value object."
    anti_phrase: >
      "Not everything should be frozen — objects with a genuine lifecycle
      (a cart filling up, an order changing state) need controlled mutation."

  - term: Principle of Least Astonishment
    chapter: 7
    definition: >
      Code should behave the way a reasonable reader of its name and
      signature expects. Astonishment is the gap between the promise a name
      makes and what the code actually does.
    why_it_matters: >
      Bugs that live in that gap hide in plain sight — the code reads
      correctly and does something else.
    prompt_phrasing: >
      "This name is misleading — the behavior doesn't match the promise.
      Rename it or split it."
    anti_phrase: >
      "Least astonishment means matching reasonable expectations, not
      dumbing every function down to one trivial line."

  - term: precondition
    chapter: 7
    definition: >
      What must be true for a call to be valid — the caller's
      responsibility (e.g. 0 <= percent <= 100).
    why_it_matters: >
      Stated and checked at the boundary, a precondition turns a silent
      wrong answer into a loud, located failure.
    prompt_phrasing: >
      "Add a precondition that fails fast: raise a ValueError on invalid
      input at the boundary."
    anti_phrase: >
      "Check preconditions where untrusted input enters — not on every
      internal helper that only sees validated data."

  - term: postcondition
    chapter: 7
    definition: >
      What a function guarantees to be true of its result on return — its
      own responsibility (e.g. the result is non-negative and rounded).
    why_it_matters: >
      Makes the function's guarantee explicit and checkable, so a violation
      is caught as a bug in the function, not downstream.
    prompt_phrasing: >
      "State and assert the postcondition: what must always be true of the
      return value?"
    anti_phrase: >
      "A postcondition you assert should be about your own logic — if it can
      fail from bad input, that's a precondition, and needs a raise."

  - term: invariant
    chapter: 7
    definition: >
      A condition that stays true throughout — across a loop, or across an
      object's whole lifetime (e.g. a cart's total always equals its
      discounted items).
    why_it_matters: >
      Naming the invariant tells you what every change must preserve; it is
      the thing encapsulation (Chapter 6) exists to protect.
    prompt_phrasing: >
      "What's the invariant here, and does every method preserve it?"
    anti_phrase: >
      "Guard the invariant at the object's boundary, not with an assert in
      every method that can't actually violate it."

  - term: fail fast
    chapter: 7
    definition: >
      When a precondition is violated, stop immediately at the boundary with
      an error that names its cause — rather than returning a
      plausible-but-wrong value that fails far away.
    why_it_matters: >
      The distance between a bug and its symptom is debugging cost; failing
      fast collapses it to zero.
    prompt_phrasing: >
      "Fail fast: raise at the boundary instead of returning None or a
      default on bad input."
    anti_phrase: >
      "Fail fast on programmer errors and bad input — not on expected,
      recoverable conditions that the caller should handle gracefully."

  - term: parse, don't validate
    chapter: 7
    definition: >
      Borrowed from Alexis King. Instead of checking a value and passing the
      same wide type onward (validate), transform it into a narrower type
      that carries the proof of validity (parse), so downstream code cannot
      receive an invalid value.
    why_it_matters: >
      Eliminates re-checking and the assertion walls it breeds: you validate
      once, at the boundary, and the type guarantees it thereafter. The
      constructive form of "make illegal states unrepresentable".
    prompt_phrasing: >
      "Parse, don't validate: turn this input into a value object (or
      Enum/Literal) that can't be constructed invalid, and have downstream
      code take that type."
    anti_phrase: >
      "Parse at meaningful boundaries with real invariants — not a bespoke
      type for every primitive (FirstName, MiddleName...): that's
      value-object soup. In Python the proof lives in the validated
      constructor, not the compiler."

  - term: Open-Closed Principle
    chapter: 8
    definition: >
      Software should be open for extension but closed for modification: you
      add new behavior by adding new code, not by editing code that already
      works.
    why_it_matters: >
      Every edit to tested code can break it; new code added alongside
      cannot. OCP confines change to new, untested-but-isolated code.
    prompt_phrasing: >
      "Make this open-closed: a new case should be a new class, not an edit
      to this function."
    anti_phrase: >
      "An interface with one implementation is speculation, not OCP — abstract
      on evidence of real variation, not a hunch (a couple of stable branches
      can stay an if/elif)."

  - term: Liskov Substitution Principle
    chapter: 8
    definition: >
      A subtype must be substitutable for its base type: it honors the base's
      contract — no stronger preconditions, no weaker postconditions, no
      surprising exceptions or return types.
    why_it_matters: >
      Code written against the base must work with any subtype; a subtype that
      breaks the promise is a bug wearing a valid type.
    prompt_phrasing: >
      "Check this subclass for a Liskov violation — does it honor the base
      class's contract?"
    anti_phrase: >
      "If a subtype can't honor the contract, it isn't a subtype — use
      composition instead of forcing the inheritance."

  - term: composition over inheritance
    chapter: 8
    definition: >
      Prefer giving an object the behavior it needs by holding another object
      (has-a, injected) over acquiring it by subclassing (is-a). Inheritance
      for genuine is-a relationships only.
    why_it_matters: >
      An injected dependency is swappable at runtime and free of inheritance's
      fragility (fragile base class, deep hierarchies). It is the basis of
      Strategy and much of Part III.
    prompt_phrasing: >
      "Prefer composition: inject what it has, don't subclass what it is."
    anti_phrase: >
      "Not a ban on inheritance — genuine is-a and Template Method are right
      uses; 'prefer' is a lean, not a law."

  - term: dependency inversion principle
    chapter: 8
    definition: >
      High-level policy and low-level details should both depend on an
      abstraction, rather than policy depending on details. The dependency
      arrow points at the interface from both sides.
    why_it_matters: >
      Insulates stable policy from volatile details, which is precisely what
      lets you add or swap details without editing the core (it is OCP's
      directional half, and the inversion Chapter 5 deferred).
    prompt_phrasing: >
      "Depend on the abstraction — invert this dependency so the core points
      at the interface, not the concrete class."
    anti_phrase: >
      "Invert at real boundaries (volatile, external, swappable) — not between
      two stable pieces that always change together; that's indirection with a
      grand name."

  - term: code to the interface
    chapter: 8
    definition: >
      Depend on an abstract type (an ABC, a Protocol, or a callable
      signature), not on a concrete class — so any conforming implementation
      can be substituted.
    why_it_matters: >
      It is the enabling technique for OCP and dependency inversion: a stable
      thing to build against while implementations come and go.
    prompt_phrasing: >
      "Code to the interface, not the implementation. Extract an interface
      (ABC) and depend on that." (ABC when you own both sides; Protocol when
      retrofitting code you don't.)
    anti_phrase: >
      "Only once a real interface exists — don't invent an abstraction to
      stand in front of a single concrete class you'll never swap."

  - term: YAGNI
    chapter: 9
    definition: >
      "You Aren't Gonna Need It" — build for today's requirement, not for
      imagined futures. Targets speculation, never evidence.
    why_it_matters: >
      Imagined futures are usually wrong in direction; an abstraction built
      for the wrong axis of change actively resists the change that arrives.
    prompt_phrasing: >
      "YAGNI — don't build that yet. Today's requirement only; list tempting
      flexibility under 'Deferred' instead of building it."
    anti_phrase: >
      "Tests, clear names, and module boundaries are never YAGNI — and don't
      delete a seam we have evidence for."

  - term: KISS
    chapter: 9
    definition: >
      "Keep It Simple" — among designs that satisfy today's requirement,
      prefer the one with the fewest concepts a reader must hold.
    why_it_matters: >
      Every moving part is a comprehension tax on every future reader,
      including your agent in its next session.
    prompt_phrasing: >
      "Keep it simple: the direct implementation, fewest moving parts."
    anti_phrase: >
      "Simple means fewest concepts, not least structure — an 800-line
      script with no functions is not simple."

  - term: premature abstraction
    chapter: 9
    definition: >
      An interface, factory, or layer introduced before a second concrete
      case exists — structure for a variation that is still a guess.
    why_it_matters: >
      The wrong abstraction costs more than duplication: it must be unwound
      before the real variation can be served.
    prompt_phrasing: >
      "No premature abstraction: no interface, factory, or layer until at
      least two concrete cases exist today."
    anti_phrase: >
      "When the change-log shows repeated requests on one axis, the seam is
      evidence-based — build it."

  - term: right-sizing
    chapter: 9
    definition: >
      Matching the amount of structure to the code's evidence: its lifespan,
      audience, and demonstrated axes of change.
    why_it_matters: >
      Agents default to maximum structure; humans drown reviewing it. The
      size declaration is the single highest-leverage line in a prompt.
    prompt_phrasing: >
      "Right-size this for a script / an internal tool / a production
      service."
    anti_phrase: >
      "Right-sizing cuts both ways — under-engineering hides complexity
      instead of removing it."

  - term: three tiers (Simple/Modular/Full)
    chapter: 9
    definition: >
      A sizing vocabulary for codebase structure. Simple — one module,
      functions and dataclasses. Modular — one package, core/infra/api,
      dependencies inward. Full — domain/application/adapters with a
      composition root.
    why_it_matters: >
      Compresses a whole structural budget into one word; most
      over-engineering disputes are undeclared disagreements about tier.
    prompt_phrasing: >
      "Start at the Simple tier." / "This project is Modular tier — see the
      conventions file."
    anti_phrase: >
      "Start Simple and promote on evidence; never scaffold a tier above
      what today's codebase has earned."

  - term: pass-through layer
    chapter: 9
    definition: >
      A class or module whose methods only forward calls to the layer
      below, adding no behavior, translation, or protection.
    why_it_matters: >
      It taxes every reader and every change with one more hop while
      providing nothing — the purest form of accidental complexity.
    prompt_phrasing: >
      "Inline this layer — let callers talk to the real thing."
    anti_phrase: >
      "A layer that translates types, enforces a contract, or isolates a
      third-party API is not a pass-through — keep it."

  - term: factory function
    chapter: 10
    definition: >
      A function that builds and returns an object chosen at runtime, hiding
      the concrete class from callers — in Python, typically backed by a
      registry dict of classes (a class is itself a callable constructor).
    why_it_matters: >
      Centralizes construction in one place, so adding a type is one
      registration and no call site changes — open-closed for creation.
    prompt_phrasing: >
      "Use a factory function backed by a registry dict; adding a type should
      be one registration."
    anti_phrase: >
      "A factory for a single type is ceremony — construct directly until two
      or more types are chosen at runtime from data."

  - term: factory method
    chapter: 10
    definition: >
      A creational pattern in which a base class defers instantiation to an
      overridable method, letting each subclass decide which concrete type to
      create.
    why_it_matters: >
      Fits when a class hierarchy already exists and each subclass must build
      its own collaborator.
    prompt_phrasing: >
      "Use a Factory Method — an overridable make_* method the subclasses
      implement."
    anti_phrase: >
      "Only when the hierarchy exists for other reasons; otherwise a factory
      function does the same in one line without a class."

  - term: abstract factory
    chapter: 10
    definition: >
      A creational pattern that builds a family of related objects through one
      interface, so the members stay mutually consistent.
    why_it_matters: >
      Prevents mismatched combinations when several objects must come from the
      same family (e.g. a gateway with its matching refund handler).
    prompt_phrasing: >
      "Use an Abstract Factory to build the whole family behind one
      interface."
    anti_phrase: >
      "Rarely needed — demand a real family that must stay consistent; most
      'families' are one object wearing a crowd."

  - term: Singleton (and the module-level alternative)
    chapter: 10
    definition: >
      A pattern ensuring a class has exactly one instance with global access.
      In Python usually unnecessary: a module is already a singleton, so a
      module-level instance gives one shared object without the machinery.
    why_it_matters: >
      You sometimes need one shared instance, but a Singleton is global state
      — hidden dependencies, hard to substitute in tests. The module-level
      instance gives the guarantee and stays injectable.
    prompt_phrasing: >
      "Use a module-level instance, not a Singleton class; make it injectable
      for tests."
    anti_phrase: >
      "Prefer the module-level instance almost always; reach for a Singleton
      class only with a concrete reason the module form can't meet."

  - term: Adapter
    chapter: 11
    definition: >
      A wrapper that implements the interface a client expects (the target)
      and translates each call to an object with a different, incompatible
      interface (the adaptee) — typically code you don't own.
    why_it_matters: >
      Lets foreign or legacy code slot into your design without its shape
      (names, units, return types) leaking across the codebase.
    prompt_phrasing: >
      "Adapt this third-party SDK to our interface — implement our target and
      translate to theirs inside."
    anti_phrase: >
      "An adapter must translate, not rename — a 1:1 forward is a pass-through.
      And don't adapt code you own; change it instead."

  - term: Façade
    chapter: 11
    definition: >
      A single simplified interface in front of a whole subsystem, coordinating
      its parts so callers depend on one entry point instead of many.
    why_it_matters: >
      A depth-adding move (Ousterhout): a tiny interface over real
      functionality, so callers learn one thing, not the orchestration.
    prompt_phrasing: >
      "Put a Façade over this subsystem — one entry point (a module-level
      function is fine) that hides the orchestration."
    anti_phrase: >
      "A façade must simplify, not forward 1:1 or re-expose the whole
      subsystem; it's an additional simple door, not a wall."

  - term: Protocol (structural typing)
    chapter: 11
    definition: >
      A Python interface that matches by shape, not by inheritance: any object
      with the right methods satisfies it, no base class required
      (typing.Protocol; @runtime_checkable for isinstance checks).
    why_it_matters: >
      The way to "code to the interface" for code you can't make inherit your
      ABC — third-party or foreign classes — and the reason a structural match
      sometimes needs no adapter at all.
    prompt_phrasing: >
      "Depend on a Protocol here (structural) so we don't have to inherit their
      class."
    anti_phrase: >
      "Own both sides → ABC (explicit, nominal); reach for Protocol when
      retrofitting, not as the default for code you control."

  - term: Composite pattern
    chapter: 12
    definition: >
      Compose objects into part-whole trees and treat a single object (a leaf)
      and a whole tree (a composite) uniformly through one shared component
      interface; the composite implements it by recursing into its children.
    why_it_matters: >
      Removes the isinstance/instanceof fork from every caller — structure logic
      lives inside the tree, so a client treats one node and a whole subtree the
      same way and new node kinds don't ripple outward.
    prompt_phrasing: >
      "Model this as a Composite: one component interface, a leaf class, and a
      container class that recurses inside the operation. Remove the type checks
      at the call sites."
    anti_phrase: >
      "Only when a node genuinely contains nodes of its own kind. If the list is
      flat and never nests, keep the loop — don't impose a tree."

  - term: Decorator pattern
    chapter: 12
    definition: >
      Attach behavior to a single object by wrapping it in another object that
      implements the same interface, delegating then augmenting; because the
      wrapper IS the interface, decorators stack at runtime.
    why_it_matters: >
      Kills the subclass-per-combination explosion: a few thin wrappers give you
      every combination by composing at the call site, and the wrapped class is
      never edited (Open-Closed for behavior).
    prompt_phrasing: >
      "Add these concerns with the Decorator pattern: a base decorator that wraps
      one instance of the interface, one thin decorator per concern, stacked at
      the call site."
    anti_phrase: >
      "Don't wrap a class you own and can edit — just edit it. And don't stack
      five layers deep; a wrapper that only forwards is a pass-through."

  - term: component interface
    chapter: 12
    definition: >
      The single interface shared by the interchangeable parts of Composite
      (leaf and container) or Decorator (wrapped and wrapper), so a client can
      treat them all as one type.
    why_it_matters: >
      It is what makes the recursion and the wrapping invisible to callers — the
      uniformity both patterns promise depends on every participant satisfying
      one contract.
    prompt_phrasing: >
      "Define one component interface that the leaf, the container (or the
      wrapped object and the wrapper) all implement."
    anti_phrase: >
      "Keep it small — one operation if that's all the tree or the stack needs;
      don't widen the interface to expose child-management on leaves."

  - term: object decorator vs function decorator
    chapter: 12
    definition: >
      The GoF Decorator pattern wraps an object at runtime (a class implementing
      the interface, holding one instance). A language @decorator is different:
      Python's @ wraps a function; TypeScript's @ annotates/transforms a class or
      field at definition time.
    why_it_matters: >
      The shared word hides two mechanics. Reach for the object pattern when you
      need stackable, runtime-composed behavior on an object; the @ syntax fixes
      one transform at definition time.
    prompt_phrasing: >
      "Use the object Decorator pattern here (a runtime wrapper), not the
      @decorator syntax."
    anti_phrase: >
      "Don't reach for @ when you need to choose and stack layers at runtime; and
      a TS @decorator is annotation, not the wrapping pattern at all."

  - term: Strategy pattern
    chapter: 13
    definition: >
      Encapsulate each variant of an algorithm behind a common interface and
      inject the chosen one; the caller is told what to use, not how to choose.
    why_it_matters: >
      Isolates the part that varies, so adding a variant never edits — or
      risks — existing variants or the code that uses them (Open-Closed).
    prompt_phrasing: >
      "Refactor this if/elif chain to the Strategy pattern. Keep the public
      signature unchanged."
    anti_phrase: >
      "Use functions as strategies — no ABC unless a strategy carries state.
      If there are only two stable branches, keep the if."

  - term: functions as strategies
    chapter: 13
    definition: >
      The Pythonic form of Strategy: each variant is a plain function (or
      closure) matching a Callable type alias, no class hierarchy.
    why_it_matters: >
      First-class functions make the classical ceremony unnecessary; closures
      carry configuration the way a constructor would.
    prompt_phrasing: >
      "Use functions as strategies with a Callable type alias. Do not
      introduce classes."
    anti_phrase: >
      "If a strategy accumulates state or needs multiple methods, promote
      that one to a class — not the rest."

  - term: registry (dispatch) dict
    chapter: 13
    definition: >
      A dict mapping keys to strategies — the single place where "which
      variants exist" is recorded.
    why_it_matters: >
      Makes the set of variants data instead of control flow; adding one is
      one function plus one entry, with callers untouched.
    prompt_phrasing: >
      "Put the strategies in a registry dict; keep the dispatch table closed
      for modification."
    anti_phrase: >
      "The dict IS the registry — no plugin loader, no config file, no
      auto-discovery."

  - term: Template Method pattern
    chapter: 13
    definition: >
      Fix an algorithm's skeleton in a base-class method; subclasses supply
      the varying steps but never the order of steps.
    why_it_matters: >
      Makes step-sequence duplication impossible — the invariant is owned by
      code the variants don't write. One of the few honest uses of inheritance.
    prompt_phrasing: >
      "Apply the Template Method pattern: one ABC owning the skeleton method;
      subclasses override the steps only."
    anti_phrase: >
      "Only if a second variant exists today — a skeleton with one subclass
      is dead weight. When unsure, prefer Strategy and composition."

  - term: hook method
    chapter: 13
    definition: >
      A step in a Template Method skeleton with a sensible default
      implementation; overriding it is optional, not required.
    why_it_matters: >
      Lets subclasses opt in to variation without forcing every format to
      restate the common case.
    prompt_phrasing: >
      "Make footer a hook with a default; only header and line_items are
      abstract."
    anti_phrase: >
      "No speculative hooks — add an override point when the second variant
      asks for it, not before."

  - term: Observer pattern
    chapter: 14
    definition: >
      Define a one-to-many dependency in which a subject notifies a list of
      subscribers when something happens, without knowing who they are
      (publish/subscribe at codebase scale).
    why_it_matters: >
      Decouples who reacts from the thing that changed: a new reaction is one
      subscribe() call and zero edits to the publishing flow (Open-Closed for
      reactions).
    prompt_phrasing: >
      "Refactor to the Observer pattern: the flow publishes one event;
      reactions are subscribers registered at the edge. Subscribers are plain
      functions."
    anti_phrase: >
      "Don't add an event bus for a single known listener — just call it. No
      topics/priorities framework for two synchronous reactions."

  - term: publish/subscribe (event)
    chapter: 14
    definition: >
      The interaction style behind Observer: producers publish events to a
      subject and consumers subscribe; neither holds a direct reference to the
      other.
    why_it_matters: >
      Turns a hardcoded chain of side-effects into an open set of independent
      reactions, each added or removed without touching the producer.
    prompt_phrasing: >
      "Publish an OrderPlaced event and let subscribers react; the producer
      must not name any individual subscriber."
    anti_phrase: >
      "Keep it greppable — a global bus where everything publishes and
      subscribes hides control flow. Use it only when reactions are many."

  - term: State pattern
    chapter: 14
    definition: >
      Let an object change its behavior when its internal state changes by
      delegating to a state object; each state owns its behavior and its legal
      transitions, and the context forwards to the current one.
    why_it_matters: >
      Replaces status-string if-ladders smeared across methods with one place
      per state, making illegal transitions impossible rather than merely
      guarded against.
    prompt_phrasing: >
      "Model this lifecycle with the State pattern: one class per state, a base
      where transitions are illegal by default, each state overriding only its
      legal moves."
    anti_phrase: >
      "Two stable states don't need a hierarchy — a boolean and a guard. For
      label-only states, prefer enum + match / a discriminated union."

  - term: explicit state machine
    chapter: 14
    definition: >
      A lifecycle modeled so that states and the transitions between them are
      first-class — as state classes, or as an enum/discriminated union plus a
      transition function — rather than implied by scattered conditionals.
    why_it_matters: >
      The legal transitions become the code (and a stateDiagram its blueprint),
      so the diagram and the implementation cannot drift apart.
    prompt_phrasing: >
      "Make the state machine explicit: enumerate the states and the legal
      transitions; an illegal move raises."
    anti_phrase: >
      "Don't over-formalize a two-state toggle; reach for it when transitions
      are many and the illegal ones must be impossible."
